services:
  readflow:
    build: .
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    environment:
      - READFLOW_ENV=production
      - READFLOW_DB_PATH=/app/data/readflow.db

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - readflow

volumes:
  caddy_data:
