<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 360px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background: #fff;
      color: #1a1a1a;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1f2937; color: #f3f4f6; }
      input { background: #374151; color: #f3f4f6; border-color: #4b5563; }
    }
    h2 { margin: 0 0 16px; font-size: 1.1rem; }
    label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 14px;
      font-size: 0.85rem;
      color: #666;
    }
    input {
      padding: 8px 10px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-size: 0.9rem;
      font-family: inherit;
    }
    input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
    }
    button {
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 500;
    }
    button:hover { background: #1d4ed8; }
    .note {
      font-size: 0.75rem;
      color: #999;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <h2>Readflow Settings</h2>
  <label>
    Server URL
    <input type="text" id="serverUrl" placeholder="https://your-server.com">
  </label>
  <label>
    API Key
    <input type="text" id="apiKey" placeholder="rf_...">
  </label>
  <button id="save-btn">Save</button>
  <div class="note">
    Generate an API key from your Readflow Settings page.
  </div>

  <script src="options.js"></script>
</body>
</html>
